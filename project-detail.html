<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Detail — Thwvy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      background: #0a0a0a;
      color: #f5f5f7;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.95);
      z-index: 1000;
      overflow-y: auto;
      animation: fadeIn 0.3s ease;
    }

    .modal.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .modal-content {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 48px 80px;
      animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .modal-title-group {
      flex: 1;
    }

    .modal-eyebrow {
      font-size: 13px;
      font-weight: 500;
      color: #0071e3;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 48px;
      font-weight: 700;
      margin-bottom: 16px;
      line-height: 1.1;
    }

    .modal-meta {
      display: flex;
      gap: 32px;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
    }

    .modal-close {
      width: 48px;
      height: 48px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #f5f5f7;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .modal-hero-image {
      width: 100%;
      height: 400px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 60px;
    }

    .modal-section {
      margin-bottom: 60px;
    }

    .modal-section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #f5f5f7;
    }

    .modal-overview {
      font-size: 18px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.7);
      margin-bottom: 40px;
    }

    .process-steps {
      display: grid;
      gap: 32px;
    }

    .process-step {
      border-left: 2px solid #0071e3;
      padding-left: 24px;
    }

    .step-number {
      font-size: 48px;
      font-weight: 700;
      color: rgba(0, 113, 227, 0.2);
      margin-bottom: -12px;
    }

    .step-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .step-description {
      font-size: 15px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.6);
    }

    .tools-list {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .tool-tag {
      display: inline-block;
      padding: 8px 16px;
      background: rgba(0, 113, 227, 0.1);
      border: 1px solid #0071e3;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #0071e3;
    }

    .project-images {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 32px;
    }

    .project-image-card {
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(0, 113, 227, 0.2);
      transition: all 0.3s ease;
    }

    .project-image-card:hover {
      border-color: #0071e3;
      background: rgba(0, 113, 227, 0.1);
      transform: translateY(-4px);
    }

    .project-image {
      width: 100%;
      height: 280px;
      object-fit: cover;
    }

    .image-info {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .image-concept {
      font-size: 14px;
      font-weight: 600;
      color: #0071e3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .image-details {
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255, 255, 255, 0.6);
    }

    @media (max-width: 768px) {
      .modal-content {
        padding: 40px 20px 60px;
      }

      .modal-title {
        font-size: 32px;
      }

      .modal-header {
        flex-direction: column;
        gap: 20px;
      }

      .modal-close {
        position: absolute;
        top: 20px;
        right: 20px;
      }

      .modal-hero-image {
        height: 280px;
        margin-bottom: 40px;
      }

      .process-step {
        padding-left: 16px;
      }

      .step-number {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>

<!-- Modal -->
<div id="projectModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title-group">
        <p class="modal-eyebrow" id="modalEyebrow">Selected Work</p>
        <h1 class="modal-title" id="modalTitle">Project Title</h1>
        <div class="modal-meta">
          <span id="modalCategory">Category</span>
          <span id="modalYear">2024</span>
        </div>
      </div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <!-- Hero Image -->
    <img id="modalHeroImage" class="modal-hero-image" src="" alt="Project" />

    <!-- Overview -->
    <div class="modal-section">
      <p class="modal-overview" id="modalOverview">Project overview will appear here.</p>
    </div>

    <!-- Tools Section -->
    <div class="modal-section">
      <h2 class="modal-section-title">Tools & Technology</h2>
      <div class="tools-list" id="toolsList"></div>
    </div>

    <!-- Process Section -->
    <div class="modal-section">
      <h2 class="modal-section-title">Design Process</h2>
      <div class="process-steps" id="processList"></div>
    </div>

    <!-- Project Images Gallery -->
    <div class="modal-section" id="imagesSection" style="display: none;">
      <h2 class="modal-section-title">Project Details & Concepts</h2>
      <div class="project-images" id="projectImagesList"></div>
    </div>
  </div>
</div>

<script>
  function openProjectDetail(projectId, pageType) {
    fetch('projects.json')
      .then(res => res.json())
      .then(data => {
        const projects = data[pageType];
        const project = projects.find(p => p.id === projectId);
        
        if (!project) return;

        // Set header
        document.getElementById('modalEyebrow').textContent = project.category;
        document.getElementById('modalTitle').textContent = project.title;
        document.getElementById('modalCategory').textContent = project.category;
        document.getElementById('modalYear').textContent = new Date().getFullYear();

        // Set hero image
        document.getElementById('modalHeroImage').src = project.image;

        // Set overview
        document.getElementById('modalOverview').textContent = project.overview;

        // Set tools
        const toolsList = document.getElementById('toolsList');
        toolsList.innerHTML = '';
        project.tools.forEach(tool => {
          const tag = document.createElement('span');
          tag.className = 'tool-tag';
          tag.textContent = tool;
          toolsList.appendChild(tag);
        });

        // Set process steps
        const processList = document.getElementById('processList');
        processList.innerHTML = '';
        project.process.forEach(step => {
          const stepEl = document.createElement('div');
          stepEl.className = 'process-step';
          stepEl.innerHTML = `
            <div class="step-number">${step.step}</div>
            <h3 class="step-title">${step.title}</h3>
            <p class="step-description">${step.description}</p>
          `;
          processList.appendChild(stepEl);
        });

        // Set project images gallery
        if (project.projectImages && project.projectImages.length > 0) {
          const imagesSection = document.getElementById('imagesSection');
          const imagesList = document.getElementById('projectImagesList');
          imagesSection.style.display = 'block';
          imagesList.innerHTML = '';
          project.projectImages.forEach(item => {
            const card = document.createElement('div');
            card.className = 'project-image-card';
            card.innerHTML = `
              <img src="${item.image}" alt="${item.concept}" class="project-image" />
              <div class="image-info">
                <div class="image-concept">${item.concept}</div>
                <div class="image-details">${item.details}</div>
              </div>
            `;
            imagesList.appendChild(card);
          });
        }

        // Show modal
        document.getElementById('projectModal').classList.add('active');
        document.body.style.overflow = 'hidden';
      })
      .catch(err => console.error('Error loading project:', err));
  }

  function closeModal() {
    document.getElementById('projectModal').classList.remove('active');
    document.body.style.overflow = 'auto';
  }

  // Close modal when clicking outside
  document.getElementById('projectModal').addEventListener('click', (e) => {
    if (e.target.id === 'projectModal') {
      closeModal();
    }
  });

  // Close modal with Escape key
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      closeModal();
    }
  });
</script>

</body>
</html>
