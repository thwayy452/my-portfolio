<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation — Thwvy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(20px); }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.9; }
      50% { transform: scale(1.15); opacity: 1; }
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }
    .anim-spin   { animation: spin 8s linear infinite; transform-origin: center; transform-box: fill-box; }
    .anim-drift  { animation: drift 4s ease-in-out infinite; }
    .anim-pulse  { animation: pulse 2.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .anim-bob    { animation: bob 3s ease-in-out infinite; }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="nav-logo">Thwvy<span class="dot">.</span></a>
    <ul class="nav-links">
      <li><a href="3d.html">3D</a></li>
      <li><a href="graphic.html">Graphic</a></li>
      <li><a href="animation.html" class="active">Motion</a></li>
      <li><a href="index.html#about">About</a></li>
    </ul>
    <a href="index.html#contact" class="nav-cta">Get in touch ↗</a>
  </nav>

  <header class="page-header">
    <p class="eyebrow">Selected Work</p>
    <h1 class="page-title">Motion animation<span class="dot">.</span></h1>
    <p class="page-lead">Loops, transitions, and short-form motion pieces — built with After Effects and rendered to feel alive.</p>
  </header>

  <section class="grid-wrap">
    <div class="grid" id="grid"></div>
  </section>

  <footer>© 2024 Thwvy — All rights reserved.</footer>

  <script src="project-detail.html"></script>
  <script>
    const pageType = 'animation';
    
    fetch('projects.json')
      .then(res => res.json())
      .then(data => {
        const grid = document.getElementById('grid');
        const projects = data[pageType];
        
        projects.forEach((project, index) => {
          const card = document.createElement('a');
          card.href = '#';
          card.className = 'card fade-in';
          card.style.animationDelay = (index * 0.05) + 's';
          card.onclick = (e) => {
            e.preventDefault();
            openProjectDetail(project.id, pageType);
          };
          
          card.innerHTML = `
            <div class="thumb">
              <span class="tag">${project.category}</span>
              <img src="${project.image}" alt="${project.title}" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <div class="meta">
              <h3>${project.title}</h3>
              <span>${new Date().getFullYear()}</span>
            </div>
          `;
          
          grid.appendChild(card);
        });
      })
      .catch(err => console.error('Error loading projects:', err));
  </script>
</body>
</html>
